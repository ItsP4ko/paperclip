name: Docker

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    tags:
      - "v*"
    # Skip rebuilding the API image when a push only touches files that the
    # backend image does not depend on. The frontend (`ui/**`) is shipped via
    # Vercel, not the Docker image, so UI-only pushes do not need a rebuild.
    paths-ignore:
      - "ui/**"
      - "src-tauri/**"
      - "doc/**"
      - "docs/**"
      - "evals/**"
      - "report/**"
      - "releases/**"
      - "skills/**"
      - "tests/**"
      - "vercel.json"
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-easypanel:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Sync environment variables to Easypanel
        env:
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          BACKEND_BETTER_AUTH_SECRET: ${{ secrets.BACKEND_BETTER_AUTH_SECRET }}
          BACKEND_PAPERCLIP_AUTH_PUBLIC_BASE_URL: ${{ secrets.BACKEND_PAPERCLIP_AUTH_PUBLIC_BASE_URL }}
          BACKEND_PAPERCLIP_ALLOWED_HOSTNAMES: ${{ secrets.BACKEND_PAPERCLIP_ALLOWED_HOSTNAMES }}
          BACKEND_BETTER_AUTH_TRUSTED_ORIGINS: ${{ secrets.BACKEND_BETTER_AUTH_TRUSTED_ORIGINS }}
          BACKEND_PAPERCLIP_EXTRA_ORIGINS: ${{ secrets.BACKEND_PAPERCLIP_EXTRA_ORIGINS }}
        run: |
          env_content=$(jq -rn \
            --arg db_url         "$BACKEND_DATABASE_URL" \
            --arg auth_secret    "$BACKEND_BETTER_AUTH_SECRET" \
            --arg auth_base_url  "$BACKEND_PAPERCLIP_AUTH_PUBLIC_BASE_URL" \
            --arg allowed_hosts  "$BACKEND_PAPERCLIP_ALLOWED_HOSTNAMES" \
            --arg trusted        "$BACKEND_BETTER_AUTH_TRUSTED_ORIGINS" \
            --arg extra_origins  "$BACKEND_PAPERCLIP_EXTRA_ORIGINS" \
            '[
              "DATABASE_URL=\($db_url)",
              "BETTER_AUTH_SECRET=\($auth_secret)",
              "PAPERCLIP_DEPLOYMENT_MODE=authenticated",
              "PAPERCLIP_DEPLOYMENT_EXPOSURE=public",
              "SERVE_UI=false",
              "PORT=3100",
              "PAPERCLIP_MIGRATION_AUTO_APPLY=true",
              "PAPERCLIP_ALLOWED_HOSTNAMES=\($allowed_hosts)",
              "PAPERCLIP_AUTH_PUBLIC_BASE_URL=\($auth_base_url)",
              "PAPERCLIP_AUTH_BASE_URL_MODE=explicit",
              "PAPERCLIP_EXTRA_ORIGINS=\($extra_origins)",
              "BETTER_AUTH_TRUSTED_ORIGINS=\($trusted)"
            ] | join("\n")')

          payload=$(jq -n --arg env "$env_content" \
            '{"json":{"projectName":"paperclip","serviceName":"paperclip-api","env":$env}}')

          curl -sf -X POST "https://qiwa34.easypanel.host/api/trpc/services.updateApp" \
            -H "Authorization: Bearer ${{ secrets.EASYPANEL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            || echo "::warning::Easypanel env sync failed — verify env vars manually in Easypanel UI"

      - name: Trigger Easypanel redeploy
        run: curl -s --max-time 10 -X POST "${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}" || true
