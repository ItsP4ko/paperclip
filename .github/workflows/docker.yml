name: Docker

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    tags:
      - "v*"
    # Skip rebuilding the API image when a push only touches files that the
    # backend image does not depend on. The frontend (`ui/**`) is shipped via
    # Vercel, not the Docker image, so UI-only pushes do not need a rebuild.
    paths-ignore:
      - "ui/**"
      - "src-tauri/**"
      - "doc/**"
      - "docs/**"
      - "evals/**"
      - "report/**"
      - "releases/**"
      - "skills/**"
      - "tests/**"
      - "vercel.json"
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-easypanel:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Trigger Easypanel redeploy
        run: curl -s --max-time 10 -X POST "${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}" || true
