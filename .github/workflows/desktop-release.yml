name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 0.2.5)
        required: true
        type: string

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS ARM target
        run: rustup target add aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Update version in tauri.conf.json
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = '${{ inputs.version }}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "

      - name: Build Tauri app (universal)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Generate latest.json for updater
        run: |
          VERSION="${{ inputs.version }}"
          TAG="desktop/v${VERSION}"
          REPO="${{ github.repository }}"

          SIG_FILE=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig)
          APP_FILE=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz)

          APP_FILENAME=$(basename "$APP_FILE")
          # URL-encode spaces
          APP_FILENAME_ENCODED="${APP_FILENAME// /%20}"
          APP_URL="https://github.com/${REPO}/releases/download/${TAG}/${APP_FILENAME_ENCODED}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 - <<PYEOF
          import json, sys

          with open("${SIG_FILE}", "r") as f:
              signature = f.read().strip()

          manifest = {
              "version": "${VERSION}",
              "notes": "Relay Control v${VERSION}",
              "pub_date": "${PUB_DATE}",
              "platforms": {
                  "darwin-aarch64": {
                      "signature": signature,
                      "url": "${APP_URL}"
                  },
                  "darwin-x86_64": {
                      "signature": signature,
                      "url": "${APP_URL}"
                  }
              }
          }

          with open("latest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print("Generated latest.json:")
          print(json.dumps(manifest, indent=2))
          PYEOF

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop/v${{ inputs.version }}
          name: Relay Control v${{ inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            latest.json
          body: |
            ## Relay Control v${{ inputs.version }}

            ### Installation
            Download the `.dmg` file and drag **Relay Control** to your Applications folder.
