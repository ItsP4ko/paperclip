name: Desktop Release

# Builds the Tauri desktop app for macOS (Apple Silicon) and Windows,
# then publishes a merged latest.json so the in-app updater can find every
# platform.
#
# The version is derived from the git tag (e.g. v0.8.5 → 0.8.5) and
# injected into tauri.conf.json before building, so you never need to
# bump it manually.
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — minisign private key (full file contents)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase (can be empty string)

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.8.5)'
        required: true
        type: string

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ── Validate tag format ──────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse and validate semver from tag
        id: parse
        shell: bash
        run: |
          TAG="${{ env.TAG }}"
          # Strip leading 'v' and validate semver (X.Y.Z)
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not produce valid semver. Expected format: vX.Y.Z (got version='$VERSION')"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $VERSION"

  # ── macOS (Apple Silicon) ────────────────────────────────────
  build-macos:
    name: Build macOS (Apple Silicon)
    needs: validate
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version in tauri.conf.json
        run: |
          jq '.version = "${{ needs.validate.outputs.version }}"' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm desktop:build

      - name: Sign updater bundle (manual fallback)
        id: sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          APP=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$APP" ]; then
            echo "::error::.app bundle not found"
            exit 1
          fi

          APP_NAME=$(basename "$APP" .app)
          TARGZ="$BUNDLE_DIR/${APP_NAME}.app.tar.gz"
          SIG="$TARGZ.sig"

          # If Tauri already created the tar.gz (auto-signing worked), skip
          if [ -f "$SIG" ]; then
            echo "Auto-signed by Tauri — skipping manual step"
            echo "targz=$TARGZ" >> "$GITHUB_OUTPUT"
            echo "sig=$SIG"     >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Creating tar.gz manually..."
          cd "$BUNDLE_DIR"
          tar czf "${APP_NAME}.app.tar.gz" "${APP_NAME}.app"
          cd -

          echo "Signing with tauri signer..."
          npx tauri signer sign \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$TARGZ"

          if [ ! -f "$SIG" ]; then
            echo "::error::Signing failed — .sig not generated"
            exit 1
          fi

          echo "Signed successfully"
          echo "targz=$TARGZ" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG"     >> "$GITHUB_OUTPUT"

      - name: Prepare artifacts and upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ env.TAG }}"
          REPO="${GITHUB_REPOSITORY}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          TARGZ="${{ steps.sign.outputs.targz }}"
          SIG="${{ steps.sign.outputs.sig }}"

          SIGNATURE=$(cat "$SIG")
          TARGZ_FILENAME=$(basename "$TARGZ" | tr ' ' '.')

          # Version-less DMG keeps a stable /releases/latest/download/ URL
          DMG_VERSIONLESS="$(dirname "$DMG")/Relay.Control_aarch64.dmg"
          cp "$DMG" "$DMG_VERSIONLESS"

          if ! gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" -R "$REPO" \
              --title "$TAG Desktop" \
              --notes ""
          fi

          gh release upload "$TAG" \
            "$DMG" \
            "$DMG_VERSIONLESS" \
            "$TARGZ" \
            "$SIG" \
            --repo "$REPO" \
            --clobber

          DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/$TARGZ_FILENAME"
          mkdir -p "$RUNNER_TEMP/updater-meta"
          cat > "$RUNNER_TEMP/updater-meta/darwin-aarch64.json" <<EOF
          {
            "signature": "$SIGNATURE",
            "url": "$DOWNLOAD_URL"
          }
          EOF

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-meta-darwin
          path: ${{ runner.temp }}/updater-meta/darwin-*.json

  # ── Windows (x86_64) ─────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    needs: validate
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version in tauri.conf.json
        shell: bash
        run: |
          jq '.version = "${{ needs.validate.outputs.version }}"' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm desktop:build

      - name: Sign NSIS installer (manual fallback)
        id: sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/nsis"
          INSTALLER=$(find "$BUNDLE_DIR" -name "*.exe" | head -1)

          if [ -z "$INSTALLER" ]; then
            echo "::error::NSIS installer not found"
            exit 1
          fi

          SIG="${INSTALLER}.sig"

          # If Tauri already signed (auto-signing worked), skip
          if [ -f "$SIG" ]; then
            echo "Auto-signed by Tauri — skipping manual step"
            echo "installer=$INSTALLER" >> "$GITHUB_OUTPUT"
            echo "sig=$SIG"             >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Signing manually with tauri signer..."
          npx tauri signer sign \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$INSTALLER"

          if [ ! -f "$SIG" ]; then
            echo "::error::Signing failed — .sig not generated"
            exit 1
          fi

          echo "Signed successfully"
          echo "installer=$INSTALLER" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG"             >> "$GITHUB_OUTPUT"

      - name: Prepare artifacts and upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ env.TAG }}"
          REPO="${GITHUB_REPOSITORY}"

          INSTALLER="${{ steps.sign.outputs.installer }}"
          SIG="${{ steps.sign.outputs.sig }}"
          SIGNATURE=$(cat "$SIG")
          INSTALLER_FILENAME=$(basename "$INSTALLER" | tr ' ' '.')

          if ! gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" -R "$REPO" \
              --title "$TAG Desktop" \
              --notes ""
          fi

          gh release upload "$TAG" \
            "$INSTALLER" \
            "$SIG" \
            --repo "$REPO" \
            --clobber

          DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/$INSTALLER_FILENAME"
          mkdir -p "$RUNNER_TEMP/updater-meta"
          cat > "$RUNNER_TEMP/updater-meta/windows-x86_64.json" <<EOF
          {
            "signature": "$SIGNATURE",
            "url": "$DOWNLOAD_URL"
          }
          EOF

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-meta-windows-x86_64
          path: ${{ runner.temp }}/updater-meta/windows-x86_64.json

  # ── Publish latest.json ──────────────────────────────────────
  publish-latest-json:
    name: Publish latest.json
    needs: [validate, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all updater metadata
        uses: actions/download-artifact@v4
        with:
          pattern: updater-meta-*
          path: /tmp/updater-meta
          merge-multiple: true

      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ env.TAG }}"
          VERSION="${{ needs.validate.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          REPO="${{ github.repository }}"

          # Read per-platform metadata fragments
          DARWIN_AARCH64=$(cat /tmp/updater-meta/darwin-aarch64.json)
          WINDOWS_X86_64=$(cat /tmp/updater-meta/windows-x86_64.json)

          # Merge into final latest.json using jq
          jq -n \
            --arg version "$VERSION" \
            --arg notes "v$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson darwin_aarch64 "$DARWIN_AARCH64" \
            --argjson windows_x86_64 "$WINDOWS_X86_64" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": $darwin_aarch64,
                "windows-x86_64": $windows_x86_64
              }
            }' > /tmp/latest.json

          echo "latest.json contents:"
          cat /tmp/latest.json

          gh release upload "$TAG" \
            /tmp/latest.json \
            --repo "$REPO" \
            --clobber
