services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    env_file:
      - ../server/.env
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "false"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "public"
      PAPERCLIP_PUBLIC_URL: "http://localhost:3100"
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: "http://localhost:3100"
      PAPERCLIP_ALLOWED_HOSTNAMES: "localhost,127.0.0.1"
      BETTER_AUTH_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost:3100,tauri://localhost"
      PAPERCLIP_EXTRA_ORIGINS: "http://localhost:5173,tauri://localhost"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - paperclip-data-dev:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata-dev:
  paperclip-data-dev:
