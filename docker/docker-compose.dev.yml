# Local dev setup — global backend on port 3000 (frees port 3100 for embedded remote-control server)
# Usage:
#   BETTER_AUTH_SECRET=devsecret docker compose -f docker/docker-compose.dev.yml up
#   Then run: pnpm desktop:dev-local


services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  server:
    image: pacosemino/paperclip-backend:dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3000"
      HOST: "0.0.0.0"
      SERVE_UI: "false"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "public"
      PAPERCLIP_PUBLIC_URL: "http://localhost:3000"
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: "http://localhost:3000"
      PAPERCLIP_AUTH_BASE_URL_MODE: "explicit"
      PAPERCLIP_EXTRA_ORIGINS: "tauri://localhost,http://localhost:5173"
      BETTER_AUTH_TRUSTED_ORIGINS: "tauri://localhost,http://localhost:5173"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-dev-secret-change-in-prod}"
    volumes:
      - paperclip-data-dev:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata-dev:
  paperclip-data-dev:
